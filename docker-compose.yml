version: '3.8'
services:
  mysql:
    image: bitnamilegacy/mysql:8.0
    container_name: logistics-mysql-primary
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=logistics_db
      - MYSQL_USER=user
      - MYSQL_PASSWORD=password
      - MYSQL_REPLICATION_MODE=master
      - MYSQL_REPLICATION_USER=repl_user
      - MYSQL_REPLICATION_PASSWORD=repl_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/bitnami/mysql/data
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-replica:
    image: bitnamilegacy/mysql:8.0
    container_name: logistics-mysql-replica
    environment:
      - MYSQL_REPLICATION_MODE=slave
      - MYSQL_REPLICATION_USER=repl_user
      - MYSQL_REPLICATION_PASSWORD=repl_password
      - MYSQL_MASTER_HOST=mysql
      - MYSQL_MASTER_ROOT_PASSWORD=root
    ports:
      - "3308:3306"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-health:
    image: bitnamilegacy/mysql:8.0
    container_name: logistics-mysql-health
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=health_db
      - MYSQL_USER=user
      - MYSQL_PASSWORD=password
    ports:
      - "3310:3306"
    volumes:
      - mysql_health_data:/bitnami/mysql/data
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-server:
    build:
      context: ./auth-server
      dockerfile: Dockerfile
    container_name: logistics-auth-server
    ports:
      - "9000:9000"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      JASYPT_ENCRYPTOR_PASSWORD: logistics-master-secret-key
      FRONTEND_URL: http://localhost:3000
      AUTH_SERVER_URL: http://auth-server:9000
    volumes:
      - auth_keys:/app/keys
    depends_on:
      mysql:
        condition: service_healthy
      mysql-replica:
        condition: service_healthy

  hea-backend:
    build:
      context: ./hea-backend
      dockerfile: Dockerfile
    container_name: logistics-hea-backend
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      JASYPT_ENCRYPTOR_PASSWORD: logistics-master-secret-key
      DB_USERNAME: user
      DB_PASSWORD: password
    depends_on:
      mysql-health:
        condition: service_healthy

  sys-backend:
    build:
      context: ./sys-backend
      dockerfile: Dockerfile
    container_name: logistics-sys-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      JASYPT_ENCRYPTOR_PASSWORD: logistics-master-secret-key
      FRONTEND_URL: http://localhost:3000
      AUTH_SERVER_URL: http://auth-server:9000
    depends_on:
      mysql:
        condition: service_healthy
      mysql-replica:
        condition: service_healthy
      auth-server:
        condition: service_started
      hea-backend:
        condition: service_started

  batch:
    build:
      context: ./batch
      dockerfile: Dockerfile
    container_name: logistics-batch
    environment:
      SPRING_PROFILES_ACTIVE: dev
      JASYPT_ENCRYPTOR_PASSWORD: logistics-master-secret-key
    depends_on:
      mysql:
        condition: service_healthy
      mysql-replica:
        condition: service_healthy
      hea-backend:
        condition: service_started


  frontend-next:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
    container_name: logistics-frontend-next
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://sys-backend:8080
      - AUTH_SERVER_URL=http://auth-server:9000
    depends_on:
      - sys-backend
      - auth-server
      - hea-backend

volumes:
  mysql_data:
  mysql_health_data:
  auth_keys:
