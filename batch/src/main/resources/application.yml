spring:
  application:
    name: batch-server
  profiles:
    active: local
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    properties:
      "[org.quartz.jobStore.isClustered]": true
      "[org.quartz.jobStore.clusterCheckinInterval]": 20000
      "[org.quartz.scheduler.instanceId]": AUTO
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  main:
    web-application-type: servlet

logging:
  level:
    "[com.logistics.batch]": DEBUG
    "[org.springframework.web]": DEBUG

server:
  port: 8082

app:
  health-service:
    url: http://localhost:8081

jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD:logistics-master-secret-key}
    algorithm: PBEWithMD5AndDES
    iv-generator-classname: org.jasypt.iv.NoIvGenerator

---
# local 프로파일 - 로컬 개발 환경 (IDE, gradlew bootRun)
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: "jdbc:mysql://localhost:3306/logistics_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
    username: ${DB_USERNAME:user}
    password: ${DB_PASSWORD:password}

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: "jdbc:mysql://mysql:3306/logistics_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
    username: ${DB_USERNAME:user}
    password: ${DB_PASSWORD:password}
  quartz:
    jdbc:
      initialize-schema: always
  jpa:
    hibernate:
      ddl-auto: update

app:
  health-service:
    url: http://hea-backend:8081
