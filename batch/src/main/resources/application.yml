spring:
  application:
    name: batch-server
  profiles:
    active: local
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    properties:
      "[org.quartz.jobStore.isClustered]": true
      "[org.quartz.jobStore.clusterCheckinInterval]": 20000
      "[org.quartz.scheduler.instanceId]": AUTO
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

# No Tomcat/Web container required for simple scheduler batch app
  main:
    web-application-type: none

jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD:logistics-master-secret-key}
    algorithm: PBEWithMD5AndDES
    iv-generator-classname: org.jasypt.iv.NoIvGenerator

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: "jdbc:mysql://mysql:3306/logistics_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
    username: ${DB_USERNAME:user}
    password: ${DB_PASSWORD:password}
  quartz:
    jdbc:
      initialize-schema: always
  jpa:
    hibernate:
      ddl-auto: update
