spring:
  application:
    name: hea-backend
  profiles:
    active: local # Default to local for IDE development
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus"

jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD:logistics-master-secret-key}
    algorithm: PBEWITHHMACSHA512ANDAES_256
    iv-generator-classname: org.jasypt.iv.RandomIvGenerator

---
# local 프로파일 - 로컬 개발 환경 (IDE)
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: "jdbc:mysql://localhost:3310/health_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true"
    username: ${DB_USERNAME:user}
    password: ${DB_PASSWORD:password}

---
# dev 프로파일 - Docker 개발 환경 (docker-compose)
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: "jdbc:mysql://mysql-health:3306/health_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true"
    username: ${DB_USERNAME:user}
    password: ${DB_PASSWORD:password}
