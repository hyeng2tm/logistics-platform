spring:
  application:
    name: wms-backend
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus"

jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD:logistics-master-secret-key}
    algorithm: PBEWITHHMACSHA512ANDAES_256
    iv-generator-classname: org.jasypt.iv.RandomIvGenerator

---
# local 프로파일 - 로컬 개발 환경 (IDE)
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: "jdbc:mysql://localhost:3306/logistics_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true"
    username: ${DB_USERNAME:ENC(mxw0D2i3raf4c9MlhY39M1fDErmNNthO0TBYyKls1CPe4EOr8hIabtZ/9nmVVxFc)}
    password: ${DB_PASSWORD:ENC(Z5t8mLe+jOeRMgWmyiIf0DfYNSVPFG1yn93xKgRYo7Aqb3xhJPl19w4VGMM5BwVs)}

app:
  mdm-service:
    url: ${MDM_SERVICE_URL:http://localhost:8082}

---
# dev 프로파일 - Docker 개발 환경 (docker-compose)
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: "jdbc:mysql://mysql:3306/logistics_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true"
    username: ${DB_USERNAME:ENC(mxw0D2i3raf4c9MlhY39M1fDErmNNthO0TBYyKls1CPe4EOr8hIabtZ/9nmVVxFc)}
    password: ${DB_PASSWORD:ENC(Z5t8mLe+jOeRMgWmyiIf0DfYNSVPFG1yn93xKgRYo7Aqb3xhJPl19w4VGMM5BwVs)}

app:
  mdm-service:
    url: ${MDM_SERVICE_URL:http://mdm-backend:8082}
