    post-logout-redirect-uris:
      - ${app.frontend-url}
    issuer-uri: ${AUTH_SERVER_URL:http://localhost:9000}

logging:
  level:
    "[org.hibernate.SQL]": off
    "[org.hibernate.orm.jdbc.bind]": off
    p6spy: info
    "[org.springframework.security]": TRACE
    "[com.logistics]": DEBUG

---
# ============================================================
# dev 프로파일 - Docker 개발 환경 (docker-compose)
# ============================================================
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    master:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: "jdbc:mysql://mysql:3306/logistics_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      username: ${DB_USERNAME:user}
      password: ${DB_PASSWORD:password}
    slave:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: "jdbc:mysql://mysql-replica:3306/logistics_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      username: ${DB_USERNAME:user}
      password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false

app:
  keystore:
    path: /app/keys/auth-keystore.jks
    password: ${KEYSTORE_PASSWORD:changeit}
  cors:
    allowed-origins:
      - ${app.frontend-url}
  oauth2:
    redirect-uris:
      - ${app.frontend-url}/callback
    post-logout-redirect-uris:
      - ${app.frontend-url}
      - ${app.frontend-url}/sign-in
    issuer-uri: ${AUTH_SERVER_URL:http://localhost:9000}

logging:
  level:
    root: INFO
    "[org.hibernate.SQL]": off
    "[org.hibernate.orm.jdbc.bind]": off
    p6spy: info
    "[org.springframework.security]": TRACE
    "[com.logistics]": DEBUG

---
# ============================================================
# prod 프로파일 - 운영 환경 (모든 민감 정보는 환경변수 필수)
# ============================================================
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    master:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: ${DB_URL_MASTER}
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}
    slave:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: ${DB_URL_SLAVE}
      username: ${DB_USERNAME_SLAVE:${DB_USERNAME}}
      password: ${DB_PASSWORD_SLAVE:${DB_PASSWORD}}
  jpa:
    hibernate:
      ddl-auto: validate # 운영에서는 스키마 자동 변경 금지
    show-sql: false

app:
  keystore:
    path: ${KEYSTORE_PATH}
    password: ${KEYSTORE_PASSWORD}
  cors:
    allowed-origins:
      - ${CORS_ALLOWED_ORIGINS}
  oauth2:
    redirect-uris:
      - ${OAUTH2_REDIRECT_URIS}
    post-logout-redirect-uris:
      - ${OAUTH2_POST_LOGOUT_REDIRECT_URIS}
    issuer-uri: ${OAUTH2_ISSUER_URI}

logging:
  level:
    "root": WARN
    "[org.hibernate.SQL]": off
    "[org.hibernate.orm.jdbc.bind]": off
    p6spy: info
    "[org.springframework.security]": WARN
    "[com.logistics]": INFO
