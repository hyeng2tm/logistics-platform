# ============================================================
# 공통 설정 (모든 프로파일에서 공유)
# ============================================================
spring:
  application:
    name: auth-server
  profiles:
    active: local # 기본 프로파일 (IDE/로컬 실행 시 적용)
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        "[format_sql]": false
        "[highlight_sql]": true
        "[use_sql_comments]": true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

server:
  port: 9000
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus"
  endpoint:
    health:
      show-details: always
    metrics:
      access: unrestricted
    prometheus:
      access: unrestricted
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    "[org.hibernate.SQL]": off
    "[org.hibernate.orm.jdbc.bind]": off


app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  keystore:
    alias: auth-server-key

jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD:logistics-master-secret-key}
    algorithm: PBEWITHHMACSHA512ANDAES_256
    iv-generator-classname: org.jasypt.iv.RandomIvGenerator

---
# ============================================================
# local 프로파일 - 로컬 개발 환경 (IDE, gradlew bootRun)
# ============================================================
