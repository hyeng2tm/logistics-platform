# ============================================================
# 공통 설정 (모든 프로파일에서 공유)
# ============================================================
spring:
  application:
    name: auth-server
  profiles:
    active: local # 기본 프로파일 (IDE/로컬 실행 시 적용)
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        "[format_sql]": false
        "[highlight_sql]": true
        "[use_sql_comments]": true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

server:
  port: 9000
  forward-headers-strategy: framework

logging:
  level:
    "[org.hibernate.SQL]": off
    "[org.hibernate.orm.jdbc.bind]": off


app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  keystore:
    alias: auth-server-key

jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD:logistics-master-secret-key}
    algorithm: PBEWithMD5AndDES
    iv-generator-classname: org.jasypt.iv.NoIvGenerator

---
# ============================================================
# local 프로파일 - 로컬 개발 환경 (IDE, gradlew bootRun)
# ============================================================
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: "jdbc:mysql://localhost:3306/logistics_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
    username: ENC(HToHXFcSRhGi7geBlfHXcg==)
    password: ENC(HbNqI2+UilXKYeT6IuL0jKOaLKPMd+pK)
  jpa:
    show-sql: false

app:
  keystore:
    path: ./keys/auth-keystore.jks
    password: changeit
  cors:
    allowed-origins:
      - ${app.frontend-url}
  oauth2:
    redirect-uris:
      - ${app.frontend-url}/callback
    post-logout-redirect-uris:
      - ${app.frontend-url}
    issuer-uri: ${AUTH_SERVER_URL:http://localhost:9000}

logging:
  level:
    "[org.hibernate.SQL]": off
    "[org.hibernate.orm.jdbc.bind]": off
    p6spy: info
    "[org.springframework.security]": TRACE
    "[com.logistics]": DEBUG

---
# ============================================================
# dev 프로파일 - Docker 개발 환경 (docker-compose)
# ============================================================
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: "jdbc:mysql:replication://mysql:3306,mysql-replica:3306/logistics_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
    username: ${DB_USERNAME:user}
    password: ${DB_PASSWORD:password}
  jpa:
    show-sql: false

app:
  keystore:
    path: /app/keys/auth-keystore.jks
    password: ${KEYSTORE_PASSWORD:changeit}
  cors:
    allowed-origins:
      - ${app.frontend-url}
  oauth2:
    redirect-uris:
      - ${app.frontend-url}/callback
    post-logout-redirect-uris:
      - ${app.frontend-url}
      - ${app.frontend-url}/sign-in
    issuer-uri: ${AUTH_SERVER_URL:http://localhost:9000}

logging:
  level:
    root: INFO
    "[org.hibernate.SQL]": off
    "[org.hibernate.orm.jdbc.bind]": off
    p6spy: info
    "[org.springframework.security]": TRACE
    "[com.logistics]": DEBUG

---
# ============================================================
# prod 프로파일 - 운영 환경 (모든 민감 정보는 환경변수 필수)
# ============================================================
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate # 운영에서는 스키마 자동 변경 금지
    show-sql: false

app:
  keystore:
    path: ${KEYSTORE_PATH}
    password: ${KEYSTORE_PASSWORD}
  cors:
    allowed-origins:
      - ${CORS_ALLOWED_ORIGINS}
  oauth2:
    redirect-uris:
      - ${OAUTH2_REDIRECT_URIS}
    post-logout-redirect-uris:
      - ${OAUTH2_POST_LOGOUT_REDIRECT_URIS}
    issuer-uri: ${OAUTH2_ISSUER_URI}

logging:
  level:
    "root": WARN
    "[org.hibernate.SQL]": off
    "[org.hibernate.orm.jdbc.bind]": off
    p6spy: info
    "[org.springframework.security]": WARN
    "[com.logistics]": INFO
