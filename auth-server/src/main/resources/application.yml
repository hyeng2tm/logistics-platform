  config:
    activate:
      on-profile: local
  datasource:
    master:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: "jdbc:mysql://localhost:3306/logistics_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      username: ENC(mxw0D2i3raf4c9MlhY39M1fDErmNNthO0TBYyKls1CPe4EOr8hIabtZ/9nmVVxFc)
      password: ENC(Z5t8mLe+jOeRMgWmyiIf0DfYNSVPFG1yn93xKgRYo7Aqb3xhJPl19w4VGMM5BwVs)
    slave:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: "jdbc:mysql://localhost:3306/logistics_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      username: ENC(mxw0D2i3raf4c9MlhY39M1fDErmNNthO0TBYyKls1CPe4EOr8hIabtZ/9nmVVxFc)
      password: ENC(Z5t8mLe+jOeRMgWmyiIf0DfYNSVPFG1yn93xKgRYo7Aqb3xhJPl19w4VGMM5BwVs)
  jpa:
    show-sql: false

app:
  keystore:
    path: ./keys/auth-keystore.jks
    password: changeit
  cors:
    allowed-origins:
      - ${app.frontend-url}
  oauth2:
