<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logistics Platform - Login</title>
    <!-- Use Google Fonts to match the React app -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/login.css}" />
  </head>
  <body>
    <div class="login-page">
      <div class="login-card">
        <div class="login-logo">🚚</div>
        <h1>Logistics Platform</h1>
        <p>물류 관리 시스템에 오신 것을 환영합니다</p>

        <div th:if="${param.error}" class="alert-error">
          아이디 또는 비밀번호가 일치하지 않습니다.
        </div>

        <div th:if="${param.logout}" class="alert-success">
          성공적으로 로그아웃 되었습니다.
        </div>

        <form th:action="@{/login}" method="post">
          <div class="form-group">
            <label for="username">사용자 아이디</label>
            <input
              type="text"
              id="username"
              name="username"
              class="form-control"
              th:value="${username ?: ''}"
              required
              autofocus
              placeholder="admin 또는 user"
            />
          </div>

          <div class="form-group">
            <label for="password">비밀번호</label>
            <input
              type="password"
              id="password"
              name="password"
              class="form-control"
              required
              placeholder="비밀번호를 입력하세요"
            />
          </div>

          <!-- CSRF Token -->
          <input
            type="hidden"
            th:name="${_csrf.parameterName}"
            th:value="${_csrf.token}"
          />

          <button type="submit" class="btn btn-primary btn-login">
            로그인
          </button>
        </form>

        <p class="login-hint">
          테스트 계정: <code>admin / admin123</code> 또는
          <code>user / user123</code>
        </p>
      </div>
    </div>
  </body>
</html>
