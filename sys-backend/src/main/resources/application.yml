# ============================================================
# 공통 설정 (모든 프로파일에서 공유)
# ============================================================
spring:
  application:
    name: sys-backend
  profiles:
    active: local # 기본 프로파일 (IDE/로컬 실행 시 적용)
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        "[format_sql]": false
        "[highlight_sql]": true
        "[use_sql_comments]": true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus"
  endpoint:
    health:
      show-details: always
    metrics:
      access: unrestricted
    prometheus:
      access: unrestricted
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    "[org.hibernate.SQL]": off
    "[org.hibernate.orm.jdbc.bind]": off

jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD:logistics-master-secret-key}
    algorithm: PBEWITHHMACSHA512ANDAES_256
    iv-generator-classname: org.jasypt.iv.RandomIvGenerator

---
# ============================================================
# local 프로파일 - 로컬 개발 환경 (IDE, gradlew bootRun)
# ============================================================
spring:
  config:
    activate:
      on-profile: local
  jpa:
    show-sql: false
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_SERVER_URL:http://localhost:9000}/oauth2/jwks
          issuer-uri: ${AUTH_SERVER_URL:http://localhost:9000}

app:
  datasource:
    master:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: "jdbc:mysql://localhost:3306/logistics_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      username: ENC(mxw0D2i3raf4c9MlhY39M1fDErmNNthO0TBYyKls1CPe4EOr8hIabtZ/9nmVVxFc)
      password: ENC(Z5t8mLe+jOeRMgWmyiIf0DfYNSVPFG1yn93xKgRYo7Aqb3xhJPl19w4VGMM5BwVs)
    slave:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: "jdbc:mysql://localhost:3306/logistics_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      username: ENC(mxw0D2i3raf4c9MlhY39M1fDErmNNthO0TBYyKls1CPe4EOr8hIabtZ/9nmVVxFc)
      password: ENC(Z5t8mLe+jOeRMgWmyiIf0DfYNSVPFG1yn93xKgRYo7Aqb3xhJPl19w4VGMM5BwVs)
  health-service:
    url: http://localhost:8081
  cors:
    allowed-origins:
      - ${FRONTEND_URL:http://localhost:3000}

logging:
  level:
    "root": INFO
    "[org.hibernate.SQL]": off
    "[org.hibernate.orm.jdbc.bind]": off
    p6spy: info
    "[org.springframework.security]": DEBUG
    "[com.logistics]": DEBUG

---
# ============================================================
# dev 프로파일 - Docker 개발 환경 (docker-compose)
# ============================================================
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://auth-server:9000/oauth2/jwks
          issuer-uri: ${AUTH_SERVER_URL:http://localhost:9000}

app:
  datasource:
    master:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: "jdbc:mysql://mysql:3306/logistics_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      username: ${DB_USERNAME:user}
      password: ${DB_PASSWORD:password}
    slave:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: "jdbc:mysql://mysql-replica:3306/logistics_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      username: ${DB_USERNAME:user}
      password: ${DB_PASSWORD:password}
  health-service:
    url: http://hea-backend:8081
  cors:
    allowed-origins:
      - ${FRONTEND_URL:http://localhost:3000}

logging:
  level:
    "root": INFO
    "[org.hibernate.SQL]": off
    "[org.hibernate.orm.jdbc.bind]": off
    p6spy: info
    "[org.springframework.security]": INFO
    "[com.logistics]": INFO

---
# ============================================================
# prod 프로파일 - 운영 환경 (모든 민감 정보는 환경변수 필수)
# ============================================================
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    hibernate:
      ddl-auto: validate # 운영에서는 스키마 자동 변경 금지
    show-sql: false
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_SERVER_JWK_URI}
          issuer-uri: ${AUTH_SERVER_ISSUER_URI}

app:
  datasource:
    master:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: ${DB_URL_MASTER}
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}
    slave:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: ${DB_URL_SLAVE}
      username: ${DB_USERNAME_SLAVE:${DB_USERNAME}}
      password: ${DB_PASSWORD_SLAVE:${DB_PASSWORD}}
  health-service:
    url: ${HEALTH_SERVICE_URL:http://hea-backend:8081}
  cors:
    allowed-origins:
      - ${CORS_ALLOWED_ORIGINS}

logging:
  level:
    root: WARN
    "[org.hibernate.SQL]": off
    "[org.hibernate.orm.jdbc.bind]": off
    p6spy: info
    "[org.springframework.security]": WARN
    "[com.logistics]": INFO
